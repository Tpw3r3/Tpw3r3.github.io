<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portfolio Website Homepage</title>
        <link rel="icon" type="image/x-icon" href="./Assets/favicon.ico">
        <link rel="stylesheet" href="styles.css"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <!--Style here until set up in css file-->
        <style>
            body {
                font-family: "Raleway", sans-serif;
                color: yellow;
            }
            .bgimg {
                background-image: url('https://images.unsplash.com/photo-1768928969717-c39ca2cf6ed7?q=80&w=1483&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
                min-height: 100%;
                background-position: center;
                background-size: cover;
            }
            p {
                background-color: purple;
            }
            .middle-display {
                text-align: center;
                padding-top: 50px;
            }
        </style>
    </head>
    
    <body>
        <!-- Navbar -->
        <div class="w3-top">
            <div class="w3-bar w3-purple w3-card w3-left-align w3-large">
                <a class="w3-bar-item w3-button w3-hide-medium w3-hide-large w3-right w3-padding-large w3-hover-white w3-large w3-red"
                    href="javascript:void(0);" onclick="myFunction()" title="Toggle Navigation Menu"><i
                        class="fa fa-bars"></i></a>
                <a href="index.html" class="w3-bar-item w3-button w3-padding-large w3-white">Home</a>
                <a href="art.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white">Art</a>
                <a href="cs.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white">CS</a>
            </div>
        
            <!-- Navbar on small screens -->
            <div id="navSmall" class="w3-bar-block w3-white w3-hide w3-hide-large w3-hide-medium w3-large">
                <a href="index.html" class="w3-bar-item w3-button w3-padding-large">Home</a>
                <a href="art.html" class="w3-bar-item w3-button w3-padding-large">Art</a>
                <a href="cs.html" class="w3-bar-item w3-button w3-padding-large">CS</a>
            </div>
        </div>
        
        <div class="bgimg">
            <main>
                <h1 class="w3-jumbo w3-animate-top">Welcome to my Portfolio!</h1>
                <div class="middle-display">
                    <h1 class="w3-jumbo w3-animate-top">COMING SOON</h1>
                    <hr class="w3-border-yellow" style="margin:auto;width:40%">
                    <p class="w3-large w3-center">This site is currently under construction.</p>
                </div>
                <div class="w3-display-bottomleft w3-padding-large">
                    Photo by <a href="https://unsplash.com/photos/snowy-mountain-peak-under-streaking-stars-pE9RxXqGbd4" target="_blank">Marek Piwnicki</a>
                </div>
            </main>
        </div>
    </body>

    <script>
        // Used to toggle the menu on small screens when clicking on the menu button
        function myFunction() {
            var x = document.getElementById("navSmall");
            if (x.className.indexOf("w3-show") == -1) {
                x.className += " w3-show";
            } else {
                x.className = x.className.replace(" w3-show", "");
            }
        }
    </script>
</html>
